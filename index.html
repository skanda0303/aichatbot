<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot - Document Assistant</title>
  <!-- Modern Premium Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #1f2937;
    }
    .chat-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      width: 550px;
      height: 700px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.08), 0 1px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .header {
      padding: 20px 24px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }
    .header-icon {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: #fcfdfe;
    }
    .msg {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.6;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .msg.user {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      background: #f3f4f6;
      color: #1f2937;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    /* Markdown Styles in Chat Bubble */
    .msg.bot p {
      margin-bottom: 8px;
    }
    .msg.bot p:last-child {
      margin-bottom: 0;
    }
    .msg.bot strong {
      color: #111827;
      font-weight: 600;
    }
    .msg.user strong {
      color: #ffffff;
      font-weight: 600;
    }
    .msg.bot ul, .msg.bot ol {
      margin-left: 20px;
      margin-bottom: 8px;
    }
    .msg.bot li {
      margin-bottom: 4px;
    }
    .msg.bot li::marker {
      color: #6366f1;
      font-weight: bold;
    }
    .msg.bot code {
      background: #e5e7eb;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .input-row {
      display: flex;
      padding: 18px 24px;
      gap: 12px;
      border-top: 1px solid #f3f4f6;
      background: white;
    }
    input {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid #e5e7eb;
      border-radius: 30px;
      font-size: 14.5px;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14.5px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Scrollbar Styling */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .messages::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }
    .messages::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }
    .clear-btn {
      background: rgba(255, 255, 255, 0.15) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      padding: 6px 14px !important;
      font-size: 12.5px !important;
      border-radius: 12px !important;
      box-shadow: none !important;
      color: white !important;
    }
    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.25) !important;
      transform: translateY(-1px) !important;
    }
  </style>
</head>
<body>
  <div class="chat-box">
    <div class="header" style="justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="header-icon"></div>
        <div class="header-title">Document AI Assistant</div>
      </div>
      <button class="clear-btn" onclick="clearHistory()">Clear Chat</button>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">Hello! Ask me anything about your documents.</div>
    </div>
    <div class="input-row">
      <input id="input" type="text" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') send()" autocomplete="off" />
      <button id="btn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    let SESSION_ID = "user-" + Math.random().toString(36).slice(2, 8);

    // Configure marked options if needed
    marked.setOptions({
      breaks: true, // translate \n to <br>
      gfm: true
    });

    async function send() {
      const input = document.getElementById("input");
      const btn   = document.getElementById("btn");
      const msgs  = document.getElementById("messages");
      const text  = input.value.trim();
      if (!text) return;

      // Show user message
      const userDiv = document.createElement("div");
      userDiv.className = "msg user";
      userDiv.textContent = text;
      msgs.appendChild(userDiv);
      
      input.value = "";
      btn.disabled = true;

      // Show typing indicator
      const typing = document.createElement("div");
      typing.className = "msg bot";
      typing.textContent = "...";
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: SESSION_ID, message: text }),
        });

        typing.textContent = "";
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          typing.innerHTML = marked.parse(buffer);
          msgs.scrollTop = msgs.scrollHeight;
        }
      } catch (e) {
        typing.textContent = "Error: could not reach the server.";
      }

      btn.disabled = false;
      msgs.scrollTop = msgs.scrollHeight;
    }

    async function clearHistory() {
      try {
        await fetch("/clear", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: SESSION_ID, message: "" })
        });
      } catch (e) {
        console.error("Failed to notify server of cleared session:", e);
      }
      
      // Generate a fresh session ID
      SESSION_ID = "user-" + Math.random().toString(36).slice(2, 8);
      
      // Clear UI
      const msgs = document.getElementById("messages");
      msgs.innerHTML = '<div class="msg bot">Hello! Ask me anything about your documents.</div>';
      
      // Reset input
      const input = document.getElementById("input");
      input.value = "";
      input.focus();
    }
  </script>
</body>
</html>
